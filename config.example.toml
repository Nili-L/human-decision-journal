owner_name = "Your Name"
# Emails, git author names, AND your git-host username/org (e.g. your GitHub handle),
# so the privacy guard allowlists you and collaboration-detection recognizes your own repos.
owner_identities = ["you@example.com", "Your Name", "your-github-username"]
# Path to the journal file (relative to repo root or absolute).
journal_path = "DECISIONS_JOURNAL.md"
# Directories under which your repos live; used to resolve a repo name to a path.
repo_roots = ["~/code"]
# Code-hosting/dev domains the privacy guard will NOT block (you legitimately cite these).
dev_domains = ["github.com", "bitbucket.org", "gitlab.com", "localhost"]
